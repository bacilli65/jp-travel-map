<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="奈良大阪行程">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B2A4A">
<meta name="description" content="Nara & Osaka 6-Day Interactive Trip Map — Rain Backup Plan">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗾</text></svg>">
<title>奈良大阪旅遊地圖 2026 — 雨天備案</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;font-family:'Noto Sans TC','Segoe UI',sans-serif;background:#1B2A4A;color:#1B2A4A;}

  /* ── RAIN BACKUP BANNER ── */
  .rain-banner{
    position:fixed;top:0;left:0;right:0;z-index:9999;
    background:linear-gradient(135deg,#1565C0,#0D47A1);
    color:#fff;text-align:center;
    padding:10px 14px;
    font-size:13px;font-weight:700;letter-spacing:.3px;
    box-shadow:0 2px 12px rgba(0,0,0,.35);
    line-height:1.5;
    border-bottom:3px solid #42A5F5;
  }
  .rain-banner .banner-close{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    background:rgba(255,255,255,.2);border:none;color:#fff;
    width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .rain-banner .banner-close:active{background:rgba(255,255,255,.35);}

  /* ── MAP (full screen on mobile) ── */
  #map{position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;}

  /* ── TOP BAR (mobile) ── */
  .topbar{
    position:absolute;top:0;left:0;right:0;z-index:1000;
    background:linear-gradient(180deg,rgba(27,42,74,.92) 0%,rgba(27,42,74,.75) 80%,transparent 100%);
    padding:env(safe-area-inset-top,8px) 12px 14px 12px;
    pointer-events:none;
  }
  .topbar *{pointer-events:auto;}
  .topbar-title{color:#fff;font-size:15px;font-weight:700;letter-spacing:.5px;text-shadow:0 1px 4px rgba(0,0,0,.4);}
  .topbar-title span{color:#C9A96E;}
  .topbar-sub{color:rgba(255,255,255,.65);font-size:11px;margin-top:1px;}

  /* ── DAY TABS (horizontal scroll, mobile-friendly) ── */
  .day-tabs{
    position:absolute;top:auto;left:0;right:0;z-index:1000;
    display:flex;gap:6px;padding:6px 10px;overflow-x:auto;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  .day-tabs::-webkit-scrollbar{display:none;}
  .day-tab{
    flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;
    background:rgba(255,255,255,.9);color:#555;cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.15);transition:all .2s;
    white-space:nowrap;border:2px solid transparent;
    min-height:44px;display:flex;align-items:center;gap:6px;
  }
  .day-tab:active{transform:scale(.95);}
  .day-tab.active{background:#fff;font-weight:700;border-color:#C9A96E;color:#1B2A4A;}
  .day-tab .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

  /* ── BOTTOM SHEET (mobile panel) ── */
  .sheet{
    position:absolute;left:0;right:0;bottom:0;z-index:1001;
    background:#fff;border-radius:20px 20px 0 0;
    box-shadow:0 -4px 24px rgba(0,0,0,.18);
    transition:transform .35s cubic-bezier(.4,0,.2,1);
    max-height:70vh;display:flex;flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom,0);
  }
  .sheet.collapsed{transform:translateY(calc(100% - 64px));}
  .sheet.expanded{transform:translateY(0);}
  .sheet-handle{
    width:40px;height:5px;border-radius:3px;background:#ccc;
    margin:10px auto 6px;flex-shrink:0;cursor:grab;
  }
  .sheet-header{
    padding:4px 16px 10px;border-bottom:1px solid #eee;flex-shrink:0;
    display:flex;align-items:center;gap:10px;
  }
  .sheet-header h2{font-size:15px;font-weight:700;flex:1;line-height:1.3;}
  .sheet-header .sh-date{font-size:11px;color:#888;}
  .sheet-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}

  /* ── STOP CARDS (larger touch targets) ── */
  .stop-card{
    padding:14px 16px;border-bottom:1px solid #f0ebe5;cursor:pointer;
    transition:background .15s;min-height:60px;
    -webkit-user-select:none;user-select:none;
  }
  .stop-card:active{background:#f0ebe5;}
  .stop-card.active{background:#f5f0e8;border-left:4px solid #C9A96E;}
  .stop-card .time{font-size:12px;font-weight:700;color:#C9A96E;}
  .stop-card .name-zh{font-size:15px;font-weight:600;color:#1B2A4A;margin-top:1px;}
  .stop-card .name-en{font-size:11px;color:#888;}
  .stop-card .desc{font-size:12px;color:#666;margin-top:5px;line-height:1.5;}
  .stop-card .badge{
    display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;
    font-weight:600;margin-top:4px;
  }
  .badge-meal{background:#FFF3E0;color:#E65100;}
  .badge-hotel{background:#E8F5E9;color:#2E7D32;}
  .badge-spot{background:#E3F2FD;color:#1565C0;}
  .badge-transport{background:#F3E5F5;color:#7B1FA2;}

  /* ── DETAIL BUTTON on stop card ── */
  .detail-btn{
    display:inline-flex;align-items:center;gap:4px;margin-top:8px;
    padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;
    background:#f5f0e8;color:#1B2A4A;border:1px solid #e0d6cc;cursor:pointer;
    min-height:32px;transition:background .15s;
  }
  .detail-btn:active{background:#e0d6cc;}

  /* ── TRANSPORT CONNECTOR ── */
  .transport-con{
    padding:6px 16px 6px 32px;background:#faf8f4;border-bottom:1px solid #f0ebe5;
    font-size:11px;color:#666;display:flex;align-items:center;gap:8px;
    position:relative;
  }
  .transport-con::before{content:'';position:absolute;left:24px;top:0;bottom:0;width:2px;background:#ddd;}
  .transport-con .t-icon{font-size:15px;z-index:1;background:#faf8f4;padding:2px 0;}
  .transport-con .t-detail{flex:1;line-height:1.5;}
  .transport-con .t-mode{
    display:inline-block;padding:1px 7px;border-radius:4px;
    font-size:10px;font-weight:600;margin-right:3px;
  }
  .t-mode-walk{background:#E8F5E9;color:#2E7D32;}
  .t-mode-train{background:#E3F2FD;color:#1565C0;}
  .t-mode-subway{background:#F3E5F5;color:#7B1FA2;}
  .t-mode-shuttle{background:#FFF3E0;color:#E65100;}
  .t-mode-taxi{background:#FCE4EC;color:#C62828;}
  .transport-con .t-dur{font-weight:700;color:#C9A96E;white-space:nowrap;font-size:11px;}

  /* ── MAP CONTROLS ── */
  .map-btn{
    position:absolute;z-index:1002;width:48px;height:48px;border-radius:50%;
    background:#fff;border:none;box-shadow:0 2px 10px rgba(0,0,0,.2);
    display:flex;align-items:center;justify-content:center;font-size:22px;
    cursor:pointer;transition:all .15s;
  }
  .map-btn:active{transform:scale(.9);background:#f0f0f0;}

  #gpsBtn{right:14px;bottom:80px;}
  #gpsBtn.tracking{background:#2196F3;color:#fff;box-shadow:0 2px 12px rgba(33,150,243,.4);}
  #gpsBtn.tracking::after{
    content:'';position:absolute;inset:-4px;border-radius:50%;
    border:2px solid #2196F3;animation:pulse 2s infinite;
  }
  @keyframes pulse{0%{transform:scale(1);opacity:.6;}100%{transform:scale(1.4);opacity:0;}}

  #navBtn{right:14px;bottom:140px;}
  #legendBtn{left:14px;bottom:80px;}

  /* ── GPS MARKER ── */
  .gps-dot{
    width:18px;height:18px;background:#2196F3;border:3px solid #fff;
    border-radius:50%;box-shadow:0 0 8px rgba(33,150,243,.5);
  }
  .gps-ring{
    width:40px;height:40px;border-radius:50%;
    background:rgba(33,150,243,.12);border:1px solid rgba(33,150,243,.25);
  }

  /* ── POPUP (mobile-friendly) ── */
  .leaflet-popup-content-wrapper{border-radius:14px!important;box-shadow:0 4px 20px rgba(0,0,0,.15)!important;padding:0!important;}
  .leaflet-popup-content{margin:0!important;min-width:200px;max-width:280px;}
  .pop-hdr{padding:8px 14px;border-radius:14px 14px 0 0;color:#fff;font-size:11px;font-weight:600;}
  .pop-body{padding:12px 14px;}
  .pop-body .p-time{font-size:11px;color:#C9A96E;font-weight:700;}
  .pop-body .p-name{font-size:14px;font-weight:700;color:#1B2A4A;margin-top:2px;}
  .pop-body .p-en{font-size:11px;color:#888;}
  .pop-body .p-desc{font-size:11px;color:#555;margin-top:6px;line-height:1.5;}
  .pop-body .p-trans{font-size:10px;color:#7B1FA2;margin-top:6px;padding:5px 7px;background:#F3E5F5;border-radius:6px;line-height:1.5;}
  .pop-body .p-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .pop-body .p-btn{
    display:inline-flex;align-items:center;gap:4px;padding:7px 12px;
    border-radius:8px;font-size:12px;font-weight:600;text-decoration:none;
    min-height:36px;cursor:pointer;
  }
  .p-btn-maps{background:#4285F4;color:#fff;}
  .p-btn-nav{background:#34A853;color:#fff;}
  .p-btn-detail{background:#C9A96E;color:#fff;border:none;font-family:inherit;}
  .p-btn-maps:active,.p-btn-nav:active,.p-btn-detail:active{opacity:.8;}

  /* ── LEGEND OVERLAY ── */
  .legend-overlay{
    position:absolute;inset:0;z-index:2000;background:rgba(0,0,0,.5);
    display:none;align-items:center;justify-content:center;
  }
  .legend-overlay.show{display:flex;}
  .legend-box{
    background:#fff;border-radius:16px;padding:20px 24px;max-width:320px;width:90%;
    box-shadow:0 8px 32px rgba(0,0,0,.25);
  }
  .legend-box h3{font-size:16px;margin-bottom:12px;}
  .legend-box .li{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;}
  .legend-box .ldot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
  .legend-close{
    display:block;margin-top:14px;padding:10px;width:100%;
    border:none;border-radius:10px;background:#f0ebe5;
    font-size:14px;font-weight:600;cursor:pointer;min-height:44px;
  }

  /* ════════════════════════════════════════ */
  /* ── DETAIL PANEL (full itinerary view) ── */
  /* ════════════════════════════════════════ */
  .detail-overlay{
    position:absolute;inset:0;z-index:2500;
    background:#fff;
    display:flex;flex-direction:column;
    transform:translateY(100%);
    transition:transform .35s cubic-bezier(.4,0,.2,1);
    will-change:transform;
  }
  .detail-overlay.show{transform:translateY(0);}
  .detail-overlay .dp-header{
    padding:env(safe-area-inset-top,10px) 14px 12px;
    border-bottom:1px solid #eee;display:flex;align-items:center;gap:10px;
    flex-shrink:0;background:#faf8f4;
  }
  .detail-overlay .dp-back{
    width:40px;height:40px;border-radius:50%;border:none;
    background:#e0d6cc;font-size:20px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .detail-overlay .dp-back:active{background:#ccc;}
  .detail-overlay .dp-title{flex:1;min-width:0;}
  .detail-overlay .dp-title h3{font-size:15px;font-weight:700;color:#1B2A4A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .detail-overlay .dp-title .dp-sub{font-size:11px;color:#888;}
  .detail-overlay .dp-body{
    overflow-y:auto;flex:1;padding:0 0 env(safe-area-inset-bottom,16px);
    -webkit-overflow-scrolling:touch;
  }

  /* Detail content sections */
  .dt-hero{padding:16px;border-bottom:1px solid #f0ebe5;}
  .dt-hero .dt-badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:12px;font-weight:600;margin-bottom:8px;}
  .dt-hero .dt-time{font-size:20px;font-weight:700;color:#C9A96E;}
  .dt-hero .dt-name{font-size:22px;font-weight:700;color:#1B2A4A;margin-top:2px;line-height:1.3;}
  .dt-hero .dt-en{font-size:13px;color:#888;margin-top:2px;}

  .dt-section{padding:14px 16px;border-bottom:1px solid #f0ebe5;}
  .dt-section-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .dt-addr{font-size:13px;color:#555;line-height:1.6;}
  .dt-addr .dt-icon{margin-right:4px;}
  .dt-text{font-size:13px;color:#333;line-height:1.8;}
  .dt-text p{margin-bottom:6px;}
  .dt-tip{
    font-size:12px;color:#1B6B3A;background:#E8F5E9;
    padding:8px 12px;border-radius:8px;margin-bottom:6px;line-height:1.6;
  }
  .dt-tip .tip-icon{margin-right:4px;}
  .dt-backup{
    font-size:12px;color:#B71C1C;background:#FFF3E0;
    padding:8px 12px;border-radius:8px;line-height:1.6;
  }
  .dt-transport-box{
    background:#F3E5F5;border-radius:10px;padding:10px 14px;
    font-size:12px;line-height:1.6;
  }
  .dt-transport-box .dtb-label{font-weight:700;color:#7B1FA2;margin-bottom:4px;}
  .dt-transport-box .dtb-detail{color:#555;}
  .dt-transport-box .dtb-cost{color:#C9A96E;font-weight:600;margin-top:2px;}

  /* Alternative restaurants */
  .dt-alt{
    background:#faf8f4;border-radius:10px;padding:10px 14px;margin-bottom:8px;
    border:1px solid #f0ebe5;
  }
  .dt-alt .alt-num{
    display:inline-flex;align-items:center;justify-content:center;
    width:20px;height:20px;border-radius:50%;background:#C9A96E;color:#fff;
    font-size:11px;font-weight:700;margin-right:6px;flex-shrink:0;
  }
  .dt-alt .alt-name{font-size:13px;font-weight:600;color:#1B2A4A;}
  .dt-alt .alt-en{font-size:11px;color:#888;}
  .dt-alt .alt-cuisine{font-size:12px;color:#666;margin-top:3px;}
  .dt-alt .alt-link{
    display:inline-flex;align-items:center;gap:3px;margin-top:6px;
    padding:5px 10px;border-radius:6px;background:#4285F4;color:#fff;
    font-size:11px;font-weight:600;text-decoration:none;
  }

  /* Detail action buttons */
  .dt-actions{
    display:flex;gap:8px;padding:16px;flex-wrap:wrap;
  }
  .dt-actions .dt-btn{
    flex:1;min-width:100px;display:flex;align-items:center;justify-content:center;
    gap:6px;padding:12px 16px;border-radius:12px;font-size:14px;font-weight:600;
    text-decoration:none;min-height:48px;border:none;cursor:pointer;
    font-family:inherit;
  }
  .dt-btn-maps{background:#4285F4;color:#fff;}
  .dt-btn-nav{background:#34A853;color:#fff;}
  .dt-btn-maps:active,.dt-btn-nav:active{opacity:.8;}

  /* ── DESKTOP SIDEBAR ── */
  @media(min-width:769px){
    #map{right:380px;}
    .sheet{display:none;}
    .detail-overlay{display:none!important;}
    .sidebar-desk{
      position:absolute;top:0;right:0;bottom:0;width:380px;z-index:1000;
      background:#fff;border-left:1px solid #e0d6cc;display:flex;flex-direction:column;
    }
    .sidebar-desk .desk-header{
      padding:16px 20px;border-bottom:1px solid #eee;background:linear-gradient(135deg,#faf7f3,#fff);flex-shrink:0;
    }
    .sidebar-desk .desk-header h2{font-size:17px;font-weight:700;}
    .sidebar-desk .desk-header .route-info{font-size:12px;color:#888;margin-top:4px;}
    .sidebar-desk .desk-tabs{
      display:flex;gap:0;border-bottom:2px solid #e0d6cc;overflow-x:auto;flex-shrink:0;
    }
    .sidebar-desk .desk-tabs .dtab{
      flex-shrink:0;padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;
      border-bottom:3px solid transparent;color:#777;white-space:nowrap;
    }
    .sidebar-desk .desk-tabs .dtab:hover{color:#1B2A4A;background:#faf7f3;}
    .sidebar-desk .desk-tabs .dtab.active{color:#1B2A4A;border-bottom-color:#C9A96E;font-weight:700;}
    .sidebar-desk .desk-tabs .dtab .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle;}
    .sidebar-desk .desk-body{overflow-y:auto;flex:1;}
    /* Desktop detail inside sidebar */
    .sidebar-desk .desk-detail-back{
      display:none;padding:10px 16px;border-bottom:1px solid #eee;
      align-items:center;gap:8px;cursor:pointer;background:#faf8f4;
    }
    .sidebar-desk .desk-detail-back.show{display:flex;}
    .sidebar-desk .desk-detail-back button{
      width:32px;height:32px;border-radius:50%;border:none;background:#e0d6cc;
      font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    }
    .sidebar-desk .desk-detail-back span{font-size:13px;font-weight:600;color:#1B2A4A;}
    .topbar{display:none;}
    .day-tabs{display:none!important;}
    #gpsBtn{bottom:30px;}
    #navBtn{bottom:90px;}
    #legendBtn{bottom:30px;}
  }
  @media(max-width:768px){
    .sidebar-desk{display:none!important;}
    .day-tabs{top:62px;}
    .sheet{bottom:0;}
  }
</style>
</head>
<body>

<!-- RAIN BACKUP BANNER -->
<div class="rain-banner" id="rainBanner">
  ☔ 雨天備案版 | 若草山 Day 2 / 東大寺 Day 3 | 若 Day 3 天氣不佳時啟用
  <button class="banner-close" onclick="document.getElementById('rainBanner').style.display='none'" title="關閉">✕</button>
</div>

<!-- MOBILE: Top bar -->
<div class="topbar" style="top:44px;">
  <div class="topbar-title">🗾 奈良·大阪 <span>行程地圖</span></div>
  <div class="topbar-sub">April 8–13, 2026 · ☔ 雨天備案版</div>
</div>

<!-- MOBILE: Day tabs -->
<div class="day-tabs" id="dayTabs" style="top:106px;"></div>

<!-- MAP -->
<div id="map" style="top:44px;"></div>

<!-- MOBILE: Bottom sheet -->
<div class="sheet collapsed" id="sheet">
  <div class="sheet-handle" id="sheetHandle"></div>
  <div class="sheet-header" id="sheetHeader"><h2>Loading...</h2></div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<!-- DESKTOP: Sidebar -->
<div class="sidebar-desk" id="sidebarDesk">
  <div class="desk-header">
    <h2>☔ 奈良·大阪 雨天備案地圖</h2>
    <div class="route-info">April 8–13, 2026 — 3 Travelers — 若草山 Day 2 / 東大寺 Day 3</div>
  </div>
  <div class="desk-tabs" id="deskTabs"></div>
  <div class="desk-detail-back" id="deskDetailBack" onclick="hideDetail()">
    <button>←</button><span>返回行程列表</span>
  </div>
  <div class="desk-body" id="deskBody"></div>
</div>

<!-- MOBILE: Detail overlay -->
<div class="detail-overlay" id="detailOverlay">
  <div class="dp-header">
    <button class="dp-back" onclick="hideDetail()">←</button>
    <div class="dp-title">
      <h3 id="dpTitleText"></h3>
      <div class="dp-sub" id="dpSubText"></div>
    </div>
  </div>
  <div class="dp-body" id="dpBody"></div>
</div>

<!-- MAP BUTTONS -->
<button class="map-btn" id="gpsBtn" title="我的位置">📍</button>
<button class="map-btn" id="navBtn" title="Google Maps 導航至下一站">🧭</button>
<button class="map-btn" id="legendBtn" title="圖例">ℹ️</button>

<!-- LEGEND OVERLAY -->
<div class="legend-overlay" id="legendOverlay">
  <div class="legend-box">
    <h3>圖例 Legend</h3>
    <div id="legendContent"></div>
    <button class="legend-close" onclick="document.getElementById('legendOverlay').classList.remove('show')">關閉</button>
  </div>
</div>

<script>
// ════════════════════════════════════════
// DATA — BACKUP VERSION: Day 2 & Day 3 swapped for rain contingency
// ════════════════════════════════════════
const DAYS = [
  {
    id:1, label:"Day 1", date:"4/8 (三)", color:"#E53935",
    title:"抵達大阪·道頓堀夜遊", titleEn:"Arrival & Dotonbori Night",
    center:[34.666,135.503], zoom:13,

}

      transHtml = `<div class="p-trans">${nt.icon} <strong>${nt.label}</strong><br>${nt.detail}<br>⏱ ${nt.duration} ${nt.cost?'· '+nt.cost:''}</div>`;
    }
    const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&travelmode=walking`;
    const hasDetail = s.detail ? true : false;
    marker.bindPopup(`
      <div class="pop-hdr" style="background:${day.color}">${day.label} · ${day.date}</div>
      <div class="pop-body">
        <div class="p-time">${s.time}</div>
        <div class="p-name">${s.zh}</div>
        <div class="p-en">${s.en}</div>
        <div class="p-desc">${s.desc}</div>
        ${transHtml}
        <div class="p-actions">
          ${hasDetail ? `<button class="p-btn p-btn-detail" onclick="showDetail(${di},${si})">📖 詳情</button>` : ''}
          <a class="p-btn p-btn-maps" href="${s.mapUrl}" target="_blank">📍 地圖</a>
          <a class="p-btn p-btn-nav" href="${navUrl}" target="_blank">🧭 導航</a>
        </div>
      </div>
    `, { maxWidth:280, minWidth:200 });
    marker._dayIndex = di; marker._stopIndex = si;
    group.addLayer(marker); allMarkers.push(marker);
    coords.push([s.lat,s.lng]);
  });
  group.addLayer(L.polyline(coords, { color:day.color, weight:4, opacity:.7, dashArray:'8,8' }));
  dayLayers.push(group);
});

// ════════════════════════════════════════
// DETAIL RENDERER
// ════════════════════════════════════════
function renderDetailHtml(di, si) {
  const day = DAYS[di], s = day.stops[si], d = s.detail;
  if (!d) return '<div style="padding:20px;color:#888;text-align:center">暫無詳細資訊</div>';

  const bc = s.type==='meal'?'badge-meal':s.type==='hotel'?'badge-hotel':s.type==='transport'?'badge-transport':'badge-spot';
  const bt = s.type==='meal'?'🍽️ 用餐':s.type==='hotel'?'🏨 住宿':s.type==='transport'?'🚃 交通':'⛩️ 景點';
  const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&travelmode=walking`;

  let html = '';

  // Hero section
  html += `<div class="dt-hero" style="border-left:4px solid ${day.color}">
    <div class="dt-badge ${bc}">${bt}</div>
    <div class="dt-time">${s.time}</div>
    <div class="dt-name">${s.zh}</div>
    <div class="dt-en">${s.en}</div>
  </div>`;

  // Address & Walk info
  if (d.addr || d.walk) {
    html += `<div class="dt-section">
      <div class="dt-section-title">📍 位置資訊</div>
      <div class="dt-addr">`;
    if (d.addr) html += `<div><span class="dt-icon">🏠</span> ${d.addr}</div>`;
    if (d.walk) html += `<div><span class="dt-icon">🚶</span> ${d.walk}</div>`;
    html += `</div></div>`;
  }

  // Main description
  if (d.text && d.text.length) {
    html += `<div class="dt-section">
      <div class="dt-section-title">📝 詳細說明</div>
      <div class="dt-text">`;
    d.text.forEach(t => { html += `<p>${t}</p>`; });
    html += `</div></div>`;
  }

  // Tips
  if (d.tips && d.tips.length) {
    html += `<div class="dt-section">
      <div class="dt-section-title">💡 貼心提醒</div>`;
    d.tips.forEach(t => {
      html += `<div class="dt-tip"><span class="tip-icon">✓</span> ${t}</div>`;
    });
    html += `</div>`;
  }

  // External links
  if (d.links && d.links.length) {
    html += `<div class="dt-section">
      <div class="dt-section-title">🔗 相關連結</div>`;
    d.links.forEach(lk => {
      html += `<a href="${lk.url}" target="_blank" style="display:block;padding:10px 14px;margin-bottom:6px;border-radius:8px;background:#f5f0e8;color:#1B2A4A;font-size:13px;font-weight:600;text-decoration:none;border:1px solid #e0d6cc">${lk.label}</a>`;
    });
    html += `</div>`;
  }

  // Transport to next
  if (s.nextTransport) {
    const nt = s.nextTransport;
    html += `<div class="dt-section">
      <div class="dt-section-title">🚏 前往下一站</div>
      <div class="dt-transport-box">
        <div class="dtb-label">${nt.icon} ${nt.label}</div>
        <div class="dtb-detail">${nt.detail}</div>
        <div class="dtb-cost">⏱ ${nt.duration} ${nt.cost ? '· 💰 ' + nt.cost : ''}</div>
      </div>
    </div>`;
  }

  // Backup plan
  if (d.backup) {
    html += `<div class="dt-section">
      <div class="dt-section-title">⚠️ 備案</div>
      <div class="dt-backup">${d.backup}</div>
    </div>`;
  }

  // Alternative restaurants
  if (d.alts && d.alts.length) {
    html += `<div class="dt-section">
      <div class="dt-section-title">🍽️ 鄰近替代選擇</div>`;
    d.alts.forEach((a, i) => {
      html += `<div class="dt-alt">
        <div style="display:flex;align-items:center">
          <span class="alt-num">${i+1}</span>
          <div>
            <div class="alt-name">${a.n}</div>
            <div class="alt-en">${a.e}</div>
          </div>
        </div>
        <div class="alt-cuisine">${a.c}</div>
        <a class="alt-link" href="${a.u}" target="_blank">📍 Google Maps</a>
      </div>`;
    });
    html += `</div>`;
  }

  // Rapi:t ticket section
  if (d.rapit) {
    const r = d.rapit;
    html += `<div class="dt-section" style="background:#EDE7F6">
      <div class="dt-section-title">🚃 南海 Rapi:t 特急車票</div>
      <div style="margin-bottom:10px">
        <a href="${r.buyUrl}" target="_blank" style="display:block;text-align:center;padding:14px 20px;border-radius:12px;background:linear-gradient(135deg,#7B1FA2,#9C27B0);color:#fff;font-size:15px;font-weight:700;text-decoration:none;box-shadow:0 3px 12px rgba(123,31,162,.35)">🎫 線上購票 — Rapi:t 電子車票</a>
        <a href="${r.infoUrl}" target="_blank" style="display:block;text-align:center;margin-top:6px;font-size:12px;color:#7B1FA2;text-decoration:underline">📋 購票說明頁面 (howto-osaka.com)</a>
      </div>
      <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:6px">票價</div>
      <table style="width:100%;font-size:12px;border-collapse:collapse;margin-bottom:10px">`;
    r.pricing.forEach(row => {
      html += `<tr><td style="padding:4px 6px;color:#555;border-bottom:1px solid rgba(0,0,0,.08)">${row[0]}</td><td style="padding:4px 6px;text-align:right;font-weight:600;color:#7B1FA2;border-bottom:1px solid rgba(0,0,0,.08);white-space:nowrap">${row[1]}</td></tr>`;
    });
    html += `</table>
      <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:6px">使用步驟</div>`;
    r.steps.forEach(step => {
      html += `<div style="font-size:12px;color:#333;line-height:1.7;padding:3px 0">${step}</div>`;
    });
    html += `<div style="margin-top:10px;font-size:12px;font-weight:700;color:#555;margin-bottom:6px">注意事項</div>`;
    r.notes.forEach(note => {
      html += `<div style="font-size:11px;color:#666;line-height:1.6;padding:2px 0;padding-left:12px;text-indent:-12px">⚠️ ${note}</div>`;
    });
    html += `</div>`;
  }

  // Budget for this day (show on first stop of each day)
  if (si === 0 && day.budget && day.budget.length) {
    html += `<div class="dt-section">
      <div class="dt-section-title">💰 ${day.label} 預算參考</div>
      <table style="width:100%;font-size:12px;border-collapse:collapse;">`;
    day.budget.forEach((row, ri) => {
      const isLast = ri === day.budget.length - 1;
      html += `<tr style="${isLast?'font-weight:700;border-top:2px solid #C9A96E;':''}">
        <td style="padding:6px 4px;color:#555">${row[0]}</td>
        <td style="padding:6px 4px;text-align:right;color:${isLast?'#C9A96E':'#333'};white-space:nowrap">${row[1]}</td>
      </tr>`;
    });
    html += `</table></div>`;
  }

  // Action buttons
  html += `<div class="dt-actions">
    <a class="dt-btn dt-btn-maps" href="${s.mapUrl}" target="_blank">📍 開啟地圖</a>
    <a class="dt-btn dt-btn-nav" href="${navUrl}" target="_blank">🧭 步行導航</a>
  </div>`;

  return html;
}

// ════════════════════════════════════════
// SHOW / HIDE DETAIL
// ════════════════════════════════════════
let detailActive = false;

function showDetail(di, si) {
  const day = DAYS[di], s = day.stops[si];
  const html = renderDetailHtml(di, si);

  if (isMobile) {
    // Close any open popup
    map.closePopup();
    // Show mobile detail overlay
    document.getElementById('dpTitleText').textContent = s.zh;
    document.getElementById('dpSubText').textContent = `${day.label} · ${day.date} · ${s.time}`;
    document.getElementById('dpBody').innerHTML = html;
    document.getElementById('detailOverlay').classList.add('show');
    document.getElementById('dpBody').scrollTop = 0;
  } else {
    // Desktop: show in sidebar
    map.closePopup();
    document.getElementById('deskBody').innerHTML = html;
    document.getElementById('deskDetailBack').classList.add('show');
  }
  detailActive = true;

  // Pan map to this stop
  map.setView([s.lat, s.lng], 16, {animate:true});
}

function hideDetail() {
  if (isMobile) {
    document.getElementById('detailOverlay').classList.remove('show');
  } else {
    document.getElementById('deskDetailBack').classList.remove('show');
    updateDesktop(currentDay);
  }
  detailActive = false;
}

// ════════════════════════════════════════
// CARD HTML BUILDER (shared by mobile & desktop)
// ════════════════════════════════════════
function buildCards(di) {
  const day = DAYS[di]; let html = '';
  day.stops.forEach((s,si) => {
    const bc = s.type==='meal'?'badge-meal':s.type==='hotel'?'badge-hotel':s.type==='transport'?'badge-transport':'badge-spot';
    const bt = s.type==='meal'?'🍽️ 用餐':s.type==='hotel'?'🏨 住宿':s.type==='transport'?'🚃 交通':'⛩️ 景點';
    html += `<div class="stop-card" data-day="${di}" data-stop="${si}" onclick="focusStop(${di},${si})">
      <div class="time">${s.time}</div>
      <div class="name-zh">${s.zh}</div>
      <div class="name-en">${s.en}</div>
      <span class="badge ${bc}">${bt}</span>
      <div class="desc">${s.desc}</div>
      ${s.detail ? `<button class="detail-btn" onclick="event.stopPropagation();showDetail(${di},${si})">📖 詳情 — 完整行程資訊</button>` : ''}
    </div>`;
    if (s.nextTransport) {
      const nt = s.nextTransport;
      html += `<div class="transport-con">
        <span class="t-icon">${nt.icon}</span>
        <div class="t-detail">
          <span class="t-mode ${nt.modeClass}">${nt.label}</span><br>
          <span style="color:#555">${nt.detail}</span>
          ${nt.cost?'<br><span style="color:#888">💰 '+nt.cost+'</span>':''}
        </div>
        <div class="t-dur">⏱ ${nt.duration}</div>
      </div>`;
    }
  });
  return html;
}

function buildAllCards() {
  let html = '';
  DAYS.forEach((day,di) => {
    html += `<div class="stop-card" style="border-left:4px solid ${day.color}" onclick="showDay(${di})">
      <div class="time" style="color:${day.color}">${day.label} — ${day.date}</div>
      <div class="name-zh" style="font-size:16px">${day.title}</div>
      <div class="name-en">${day.titleEn}</div>
      <div class="desc">${day.stops.length} 站：${day.stops.map(s=>s.zh).join(' → ')}</div>
    </div>`;
  });
  return html;
}

// ════════════════════════════════════════
// NAV FUNCTIONS
// ════════════════════════════════════════
function showDay(i) {
  currentDay = i;
  const day = DAYS[i];
  // Hide detail if open
  hideDetail();
  // Update tabs
  document.querySelectorAll('.day-tab').forEach((t,j) => t.classList.toggle('active',j===i));
  document.querySelectorAll('.dtab').forEach((t,j) => t.classList.toggle('active',j===i));
  // Layers
  dayLayers.forEach(l => map.removeLayer(l));
  dayLayers[i].addTo(map);
  const coords = day.stops.map(s=>[s.lat,s.lng]);
  if(coords.length>1) map.fitBounds(coords,{padding:isMobile?[40,40]:[50,50],maxZoom:15});
  else map.setView(coords[0],day.zoom);
  // Update panels
  updateMobileSheet(i);
  updateDesktop(i);
}

function showAllDays() {
  hideDetail();
  document.querySelectorAll('.day-tab').forEach((t,i)=>t.classList.toggle('active',i===DAYS.length));
  document.querySelectorAll('.dtab').forEach((t,i)=>t.classList.toggle('active',i===DAYS.length));
  dayLayers.forEach(l=>l.addTo(map));
  map.fitBounds(DAYS.flatMap(d=>d.stops.map(s=>[s.lat,s.lng])),{padding:[40,40]});
  updateMobileSheetAll();
  updateDesktopAll();
}

function focusStop(di,si) {
  const s = DAYS[di].stops[si];
  map.setView([s.lat,s.lng],16,{animate:true});
  const m = allMarkers.find(m=>m._dayIndex===di&&m._stopIndex===si);
  if(m) m.openPopup();
  document.querySelectorAll('.stop-card').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll(`.stop-card[data-day="${di}"][data-stop="${si}"]`).forEach(c=>{
    c.classList.add('active');
    c.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
  // On mobile, expand sheet
  if(isMobile){ sheetExpanded=true; sheet.className='sheet expanded'; }
}

// ════════════════════════════════════════
// GPS TRACKING
// ════════════════════════════════════════
let gpsTracking = false, gpsWatchId = null, gpsMarker = null, gpsCircle = null;
const gpsBtn = document.getElementById('gpsBtn');

gpsBtn.onclick = () => {
  if (!navigator.geolocation) { alert('此裝置不支援 GPS 定位'); return; }
  if (gpsTracking) { stopGPS(); return; }
  gpsTracking = true;
  gpsBtn.classList.add('tracking');
  gpsBtn.textContent = '📍';
  gpsWatchId = navigator.geolocation.watchPosition(pos => {
    const ll = [pos.coords.latitude, pos.coords.longitude];
    const acc = pos.coords.accuracy;
    if (!gpsMarker) {
      gpsMarker = L.marker(ll, {
        icon: L.divIcon({ className:'x', html:'<div class="gps-dot"></div>', iconSize:[18,18], iconAnchor:[9,9] }),
        zIndexOffset: 2000,
      }).addTo(map);
      gpsCircle = L.circle(ll, { radius:acc, color:'#2196F3', fillColor:'#2196F3', fillOpacity:.08, weight:1 }).addTo(map);
      map.setView(ll, 16);
    } else {
      gpsMarker.setLatLng(ll);
      gpsCircle.setLatLng(ll).setRadius(acc);
    }
  }, err => {
    alert('無法取得位置：' + err.message);
    stopGPS();
  }, { enableHighAccuracy:true, maximumAge:5000, timeout:15000 });
};

function stopGPS() {
  gpsTracking = false;
  gpsBtn.classList.remove('tracking');
  if(gpsWatchId!==null) navigator.geolocation.clearWatch(gpsWatchId);
  if(gpsMarker){ map.removeLayer(gpsMarker); gpsMarker=null; }
  if(gpsCircle){ map.removeLayer(gpsCircle); gpsCircle=null; }
}

// ════════════════════════════════════════
// NAVIGATE TO NEXT STOP (Google Maps directions)
// ════════════════════════════════════════
document.getElementById('navBtn').onclick = () => {
  const day = DAYS[currentDay];
  if(!day) return;
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  let nextStop = day.stops[0];
  for (const s of day.stops) {
    const [sh,sm] = s.time.split(':').map(Number);
    if (h < sh || (h===sh && m < sm)) { nextStop = s; break; }
    nextStop = s;
  }
  const url = `https://www.google.com/maps/dir/?api=1&destination=${nextStop.lat},${nextStop.lng}&travelmode=walking`;
  window.open(url, '_blank');
};
